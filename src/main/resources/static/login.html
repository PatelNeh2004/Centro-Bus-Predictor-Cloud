<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Page setup -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro Bus App Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <p class="brand-kicker">Centro Bus Predictor</p>
      <h1>Admin Login</h1>
      <p class="login-copy">Sign in to open the admin page</p>

      <form id="login-form" class="login-form">
        <label class="admin-field">
          <span>Username</span>
          <input id="login-username" class="form-control login-input" type="text" placeholder="Enter username">
        </label>

        <label class="admin-field">
          <span>Password</span>
          <input id="login-password" class="form-control login-input" type="password" placeholder="Enter password">
        </label>

        <p id="login-message" class="login-message" aria-live="polite"></p>
        <button class="btn admin-action-btn login-submit" type="submit">Log In</button>
      </form>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>

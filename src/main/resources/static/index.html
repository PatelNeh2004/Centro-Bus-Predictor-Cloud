<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Centro Bus Predictor</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/lucide-static@0.460.0/font/lucide.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <header>
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon"><i class="lucide-bus"></i></div>
                    <div class="logo-text">
                        <span class="logo-name">CentroBus</span>
                        <span class="logo-sub">Arrival Predictor</span>
                    </div>
                </div>
                <a href="login.html" class="admin-link">
                            <i class="lucide-shield"></i>
                            <span>Admin</span>
                        </a>
            </div>
        </header>

        <div class="search-strip">
            <div class="search-strip-inner">
                <input
                    type="text"
                    id="searchBox"
                    placeholder="Search stops, routes..."
                    autocomplete="off"
                />
                <button id="searchBtn" type="button">
                    <i class="lucide-search"></i>
                </button>
            </div>
        </div>

        <main>
            <aside class="filters">
                <div class="filter-header">
                    <h3>Filters</h3>
                    <button id="clearFilters">Clear all</button>
                </div>

                <div class="filter-group">
                    <h4>Routes</h4>
                    <p class="filter-hint">Select one or more</p>
                    <div id="routeFilters" class="filter-options">
                        <div class="filter-loading">Loading...</div>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Time Frame</h4>
                    <div class="filter-options tf-options">
                        <label class="filter-chip selected" data-tf="all">
                            <input
                                type="radio"
                                name="timeframe"
                                value="all"
                                checked
                            />
                            <span>All data</span>
                        </label>
                        <label class="filter-chip" data-tf="7">
                            <input type="radio" name="timeframe" value="7" />
                            <span>Last 7 days</span>
                        </label>
                        <label class="filter-chip" data-tf="30">
                            <input type="radio" name="timeframe" value="30" />
                            <span>Last 30 days</span>
                        </label>
                    </div>
                </div>
            </aside>

            <section class="results-area">
                <div class="results-toolbar">
                    <p id="resultCount">Loading stops...</p>
                </div>
                <div id="stopsList" class="stops-grid"></div>
            </section>
        </main>

        <div id="modal" class="modal-overlay hidden">
            <div class="modal-box">
                <button id="modalClose" class="modal-close">&times;</button>
                <div id="modalContent"></div>
            </div>
        </div>

        <script src="js/app.js"></script>
    </body>
</html>
